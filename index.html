<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildDet3D-Bench Visualization</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="header-title">WildDet3D-Bench Visualization</h1>
                <!--
                <div class="header-stats" id="header-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="stat-total">-</span>
                        <span class="stat-label">Images</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-scored">-</span>
                        <span class="stat-label">With 3D Boxes</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-categories">-</span>
                        <span class="stat-label">Scene Categories</span>
                    </div>
                </div>
                -->
            </div>
        </header>

        <!-- Main Content -->
        <!-- Open sidebar button (visible when sidebar is collapsed) -->
        <button class="sidebar-open-btn" id="sidebar-open" title="Open Scene Categories">&rsaquo;</button>

        <div class="main-layout">
            <!-- Sidebar: Scene Tree (collapsed by default) -->
            <aside class="sidebar collapsed">
                <div class="sidebar-header">
                    <h2 class="sidebar-title">Scene Categories</h2>
                    <button class="sidebar-close-btn" id="sidebar-close" title="Close Sidebar">&lsaquo;</button>
                </div>
                <div class="tree-container" id="tree-container">
                    <div class="loading">Loading scene tree...</div>
                </div>
            </aside>

            <!-- Content: Image Grid -->
            <main class="content">
                <div class="content-header">
                    <h2 class="content-title" id="content-title">All Images</h2>
                    <div class="content-controls">
                        <div class="search-box">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input type="text" id="search-input" placeholder="Search by image ID...">
                        </div>
                        <div class="filter-buttons">
                            <button class="filter-btn active" data-filter="all">All</button>
                            <button class="filter-btn" data-filter="coco_val">COCO Val</button>
                            <button class="filter-btn" data-filter="lvis_train">LVIS Train</button>
                            <button class="filter-btn" data-filter="obj365_val">Obj365 Val</button>
                            <button class="shuffle-btn" id="shuffle-toggle">Shuffle</button>
                        </div>
                    </div>
                </div>

                <div class="image-grid" id="image-grid">
                    <div class="loading">Loading images...</div>
                </div>

                <div class="pagination" id="pagination">
                    <!-- Pagination will be rendered here -->
                </div>
            </main>
        </div>
    </div>

    <script src="js/scene-tree.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
