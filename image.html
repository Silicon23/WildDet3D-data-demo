<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Detail - Val Set Visualization</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container detail-page">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <a href="index.html" class="back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to Gallery
                </a>
                <div class="image-info" id="image-info">
                    <h1 class="header-title">Image <span id="image-id">-</span></h1>
                    <div class="image-meta">
                        <span class="badge" id="source-badge">-</span>
                        <span class="meta-item" id="scene-path">-</span>
                        <span class="meta-item" id="dimensions">-</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="detail-content">
            <!-- Human-Annotated 3D Boxes -->
            <section class="detail-section" id="section-filtered">
                <div class="section-header">
                    <h2 class="section-title">Human-Annotated 3D Boxes</h2>
                    <p class="section-desc">Human-selected 3D bounding boxes for valid annotations (colored by category)</p>
                    <button class="download-btn toggle-labels-btn" id="toggle-labels" title="Show/hide category labels">Aa Labels</button>
                    <button class="download-btn" id="show-all-boxes" title="Show all hidden boxes">Show All</button>
                    <button class="download-btn combined-dl-btn" id="dl-combined" title="Download 3D projection + point cloud side by side">&#x2B73; Download Combined</button>
                </div>

                <div class="viz-grid">
                    <div class="viz-panel">
                        <div class="viz-title-bar">
                            <h3 class="viz-title">2D Bounding Boxes</h3>
                            <button class="download-btn" id="dl-2d" title="Save as PNG">&#x2B73;</button>
                        </div>
                        <div class="viz-container">
                            <canvas id="canvas-2d-filtered"></canvas>
                            <img id="img-2d-filtered" style="display:none;">
                        </div>
                    </div>

                    <div class="viz-panel">
                        <div class="viz-title-bar">
                            <h3 class="viz-title">3D Boxes Projected to 2D</h3>
                            <button class="download-btn" id="dl-3d-proj" title="Save as PNG">&#x2B73;</button>
                        </div>
                        <div class="viz-container">
                            <canvas id="canvas-3d-filtered"></canvas>
                            <img id="img-3d-filtered" style="display:none;">
                        </div>
                    </div>

                    <div class="viz-panel viz-3d">
                        <div class="viz-title-bar">
                            <h3 class="viz-title">Interactive 3D View</h3>
                            <button class="download-btn" id="dl-3d-snap" title="Save current view as PNG">&#x2B73;</button>
                            <button class="download-btn" id="dl-3d-video" title="Export one rotation cycle as video">&#x23FA; Export Video</button>
                        </div>
                        <div class="viz-container threejs-container" id="threejs-filtered">
                            <div class="loading">Loading 3D view...</div>
                        </div>
                        <div class="viewer-controls-hint">
                            <span>Left: Rotate</span>
                            <span>Right: Pan</span>
                            <span>Scroll: Zoom</span>
                            <span>Double-click: Reset</span>
                        </div>
                    </div>
                </div>

                <!-- Annotation list: show/hide and edit category names -->
                <div class="annotation-list" id="annotation-list">
                    <h3 class="annotation-list-title">Annotations</h3>
                    <div class="annotation-list-items" id="annotation-list-items">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/PLYLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="js/three-viewer.js"></script>
    <script src="js/overlay-renderer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
